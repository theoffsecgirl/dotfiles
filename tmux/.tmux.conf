# tmux: OffSec workflow (Mac/Linux)
set -g mouse on
set -g history-limit 100000
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Splits (más intuitivos)
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Nueva ventana en mismo path
bind c new-window -c "#{pane_current_path}"

# Vim-like pane nav
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reload
bind r source-file ~/.tmux.conf \; display-message "tmux: recargado"

# Faster escape
set -sg escape-time 10
set -g focus-events on

# Start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows
set -g renumber-windows on

# Status bar
set -g status-interval 5
set -g status-position top
set -g status-style 'bg=default fg=white'
set -g status-left-length 40
set -g status-right-length 120
set -g status-left '#[fg=green,bold]#S #[fg=white]│ '
set -g status-right '#[fg=white]%Y-%m-%d #[fg=green,bold]%H:%M'

# Window status
setw -g window-status-current-style 'fg=black bg=green bold'
setw -g window-status-current-format ' #I:#W '
setw -g window-status-style 'fg=white'
setw -g window-status-format ' #I:#W '

# Pane borders
set -g pane-border-style 'fg=colour238'
set -g pane-active-border-style 'fg=green'

# Copy mode (vi)
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection

# Copy to system clipboard (macOS)
if-shell "uname | grep -q Darwin" \
  "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'" \
  "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'xclip -selection clipboard'"

# Sessionizer (Ctrl+a Ctrl+f para buscar proyectos)
bind-key -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"

# Hunting shortcuts
bind-key H split-window -h "cd ~/hunting && $SHELL"
bind-key T split-window -v "cd ~/hunting/targets && $SHELL"
bind-key N split-window -v "cd ~/hunting/notes && nvim"

# Kill sin confirmación
bind-key x kill-pane
bind-key X kill-window
