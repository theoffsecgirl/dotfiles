# tmux: OffSec workflow — theoffsecgirl
# Catppuccin Mocha palette

# ── Core ─────────────────────────────────────────────────────
set -g mouse on
set -g history-limit 100000
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'
set -sg escape-time 10
set -g focus-events on

# ── Prefix ───────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Índices desde 1 ──────────────────────────────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ── Splits ───────────────────────────────────────────────────
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ── Navegación vim-like ───────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Resize ───────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Swap windows ─────────────────────────────────────────────
bind -r "<" swap-window -t -1 \; previous-window
bind -r ">" swap-window -t +1 \; next-window

# ── Reload ───────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display-message "✓ tmux recargado"

# ── Kill sin confirmación ────────────────────────────────────
bind-key x kill-pane
bind-key X kill-window

# ── Toggle status bar ────────────────────────────────────────
bind-key b set-option status

# ── Copy mode (vi) ───────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
if-shell "uname | grep -q Darwin" \
  "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'" \
  "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'xclip -selection clipboard'"

# ── Sessionizer ──────────────────────────────────────────────
bind-key -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"

# ── Popups ───────────────────────────────────────────────────
bind-key -r g display-popup -E -w 80% -h 80% -d "#{pane_current_path}"
bind-key -r C-n display-popup -E -w 80% -h 80% 'nvim "$HUNTING_HOME/notes/$(date +%Y-%m-%d)-quick.md"'

# ── Hunting shortcuts ────────────────────────────────────────
bind-key H split-window -h -c "$HUNTING_HOME"
bind-key T split-window -v -c "$HUNTING_HOME/targets"
bind-key N split-window -v 'cd "$HUNTING_HOME/notes" && nvim'

# ============================================================
# STATUS BAR — Catppuccin Mocha
# Colores: base=#1e1e2e surface0=#313244 overlay0=#6c7086
#          text=#cdd6f4 subtext0=#a6adc8
#          green=#a6e3a1 pink=#f5c2e7 blue=#89b4fa mauve=#cba6f7
# ============================================================
set -g status-interval 5
set -g status-position top
set -g status-style "bg=#1e1e2e fg=#cdd6f4"

set -g status-left-length  40
set -g status-right-length 120

set -g status-left  "#[fg=#a6e3a1,bold]❯ #[fg=#cba6f7,bold]#S #[fg=#6c7086]│ "
set -g status-right "#[fg=#6c7086]#(whoami)@#H #[fg=#6c7086]│ #[fg=#a6e3a1,bold]%H:%M #[fg=#6c7086]%d/%m"

setw -g window-status-current-style  "fg=#1e1e2e bg=#cba6f7 bold"
setw -g window-status-current-format " #I:#W#F "
setw -g window-status-style          "fg=#6c7086"
setw -g window-status-format         " #I:#W#F "

set -g pane-border-style        "fg=#313244"
set -g pane-active-border-style "fg=#cba6f7"

set -g message-style "fg=#1e1e2e bg=#a6e3a1 bold"

# ============================================================
# PLUGINS (TPM)
# ============================================================
if "test ! -d ~/.tmux/plugins/tpm" \
  "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'fcsonline/tmux-thumbs'

# Resurrect
set -g @resurrect-processes 'nvim zsh'
set -g @resurrect-strategy-nvim 'session'

# Continuum
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Yank
set -g @yank_selection_mouse 'clipboard'

# Thumbs — copiar URLs/IPs/hashes de pantalla con prefix+Space
set -g @thumbs-key Space
set -g @thumbs-command 'echo -n {} | pbcopy'
set -g @thumbs-unique enabled

# Inicializar TPM (debe ir al final)
run '~/.tmux/plugins/tpm/tpm'
