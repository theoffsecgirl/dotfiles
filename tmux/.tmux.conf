# tmux: OffSec workflow (Mac/Linux)
# Inspirado por: ThePrimeagen, Dreams of Code

set -g mouse on
set -g history-limit 100000
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'

# Prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Splits intuitivos
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Nueva ventana en mismo path
bind c new-window -c "#{pane_current_path}"

# Vim-like pane nav
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reload
bind r source-file ~/.tmux.conf \; display-message "✓ tmux recargado"

# Timings
set -sg escape-time 10
set -g focus-events on

# Índices desde 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Status bar
set -g status-interval 5
set -g status-position top
set -g status-style 'bg=default fg=white'
set -g status-left-length 40
set -g status-right-length 120
set -g status-left '#[fg=blue,bold]❯ #[fg=green,bold]#S #[fg=white]│ '
set -g status-right '#[fg=white]#(whoami)@#H #[fg=white]│ #[fg=green,bold]%H:%M #[fg=white]%d/%m'

# Window status
setw -g window-status-current-style 'fg=black bg=green bold'
setw -g window-status-current-format ' #I:#W#F '
setw -g window-status-style 'fg=white dim'
setw -g window-status-format ' #I:#W#F '

# Pane borders
set -g pane-border-style 'fg=colour238'
set -g pane-active-border-style 'fg=green'

# Messages
set -g message-style 'fg=black bg=green bold'

# Copy mode (vi)
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection

# Copy to system clipboard (macOS / Linux)
if-shell "uname | grep -q Darwin" \
  "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'" \
  "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'xclip -selection clipboard'"

# Sessionizer (C-a C-f)
bind-key -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"

# Popup terminal (C-a C-g)
bind-key -r g display-popup -E -w 80% -h 80% -d "#{pane_current_path}"

# Popup hunting notes (C-a C-n)
bind-key -r C-n display-popup -E -w 80% -h 80% "nvim ~/hunting/notes/$(date +%Y-%m-%d)-quick.md"

# Hunting shortcuts
bind-key H split-window -h -c "~/hunting"
bind-key T split-window -v -c "~/hunting/targets"
bind-key N split-window -v "cd ~/hunting/notes && nvim"

# Kill sin confirmación
bind-key x kill-pane
bind-key X kill-window

# Swap windows
bind -r "<" swap-window -t -1 \; previous-window
bind -r ">" swap-window -t +1 \; next-window

# Toggle status bar
bind-key b set-option status

# ============================================
# PLUGINS (TPM)
# ============================================

if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

# Resurrect — solo restaura procesos conocidos, NO captura contenido de panes
# (evita guardar tokens/passwords visibles en terminal)
set -g @resurrect-processes 'nvim zsh'
set -g @resurrect-strategy-nvim 'session'
# capture-pane-contents desactivado intencionadamente (riesgo de fuga de datos)
# set -g @resurrect-capture-pane-contents 'on'

# Continuum — auto-save cada 15 min
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Yank
set -g @yank_selection_mouse 'clipboard'

# Inicializar TPM (debe ir al final)
run '~/.tmux/plugins/tpm/tpm'
