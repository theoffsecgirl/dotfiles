# tmux: OffSec workflow — theoffsecgirl
# Catppuccin Mocha palette

# ── Core ─────────────────────────────────────────────────────
set -g mouse on
set -g history-limit 100000
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'
set -sg escape-time 10
set -g focus-events on

# ── Prefix ───────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Índices desde 1 ──────────────────────────────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ── Splits ───────────────────────────────────────────────────
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ── Navegación vim-like ───────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Resize ───────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Swap windows ─────────────────────────────────────────────
bind -r "<" swap-window -t -1 \; previous-window
bind -r ">" swap-window -t +1 \; next-window

# ── Reload ───────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display-message "✓ tmux recargado"

# ── Kill sin confirmación ────────────────────────────────────
bind-key x kill-pane
bind-key X kill-window

# ── Toggle status bar ────────────────────────────────────────
bind-key b set-option status

# ── Copy mode (vi) ───────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
if-shell "uname | grep -q Darwin" \
  "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'" \
  "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'xclip -selection clipboard'"

# ── Sessionizer ──────────────────────────────────────────────
bind-key -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"

# ── Popups ───────────────────────────────────────────────────
bind-key -r g display-popup -E -w 80% -h 80% -d "#{pane_current_path}"
bind-key -r C-n display-popup -E -w 80% -h 80% 'nvim "$HUNTING_HOME/notes/$(date +%Y-%m-%d)-quick.md"'

# ── Hunting shortcuts ────────────────────────────────────────
bind-key H split-window -h -c "$HUNTING_HOME"
bind-key T split-window -v -c "$HUNTING_HOME/targets"
bind-key N split-window -v 'cd "$HUNTING_HOME/notes" && nvim'

# ============================================================
# STATUS BAR - Catppuccin Mocha (powerline)
# ============================================================
set -g status-interval 5
set -g status-position bottom
set -g status-style "bg=#1e1e2e fg=#cdd6f4"
set -g status-left-length  60
set -g status-right-length 140

# Left: session pill
set -g status-left "#[fg=#1e1e2e,bg=#cba6f7,bold]  #S #[fg=#cba6f7,bg=#313244,nobold]#[fg=#cdd6f4,bg=#313244] #(whoami) #[fg=#313244,bg=#1e1e2e] "

# Right: dir | time | date
set -g status-right " #[fg=#313244,bg=#1e1e2e]#[fg=#6c7086,bg=#313244] #{b:pane_current_path}  #[fg=#89b4fa] %H:%M #[fg=#313244,bg=#cba6f7]#[fg=#1e1e2e,bg=#cba6f7,bold] %d %b "

# Windows
setw -g window-status-current-style  "fg=#1e1e2e bg=#89b4fa bold"
setw -g window-status-current-format "#[fg=#1e1e2e,bg=#89b4fa,bold]  #I  #W #[fg=#89b4fa,bg=#1e1e2e,nobold]"
setw -g window-status-style          "fg=#6c7086 bg=#1e1e2e"
setw -g window-status-format         "  #I  #W  "
setw -g window-status-separator      ""

# Panes
set -g pane-border-style        "fg=#313244"
set -g pane-active-border-style "fg=#cba6f7"

# Messages
set -g message-style         "fg=#1e1e2e bg=#f9e2af bold"
set -g message-command-style "fg=#1e1e2e bg=#cba6f7 bold"
setw -g mode-style           "fg=#1e1e2e bg=#f38ba8 bold"

# ============================================================
# PLUGINS (TPM)
# ============================================================
if "test ! -d ~/.tmux/plugins/tpm" \
  "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'fcsonline/tmux-thumbs'

# Resurrect
set -g @resurrect-processes 'nvim zsh'
set -g @resurrect-strategy-nvim 'session'

# Continuum
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Yank
set -g @yank_selection_mouse 'clipboard'

# Thumbs — copiar URLs/IPs/hashes de pantalla con prefix+Space
set -g @thumbs-key Space
set -g @thumbs-command 'echo -n {} | pbcopy'
set -g @thumbs-unique enabled

# Inicializar TPM (debe ir al final)
run '~/.tmux/plugins/tpm/tpm'
